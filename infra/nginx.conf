server {
    listen 80;
    server_name agentdb.zizka.ai;

    # Let Certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name agentdb.zizka.ai;

    ssl_certificate     /etc/letsencrypt/live/agentdb.zizka.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentdb.zizka.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── API — FastAPI backend ───────────────────────────────────────────────
    # Primary path: /v1/
    location /v1/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Compatibility redirect: /api/v1/ → /v1/  (prevents 404 for developers)
    location /api/v1/ {
        return 301 https://$host/v1/$request_uri;
    }

    # Compatibility redirect: /api/ → /v1/  (catches /api/events, /api/search, etc.)
    location /api/ {
        rewrite ^/api/(.*)$ /v1/$1 permanent;
    }

    # Health check (no auth required)
    location /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # OpenAPI docs (useful for developers)
    location /docs {
        proxy_pass         http://127.0.0.1:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /openapi.json {
        proxy_pass         http://127.0.0.1:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ─── Dashboard — Next.js frontend ───────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
