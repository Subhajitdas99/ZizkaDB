name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            core/requirements.txt
            core/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r core/requirements.txt -r core/requirements-dev.txt
          pip install -e sdk/python -e integrations/langchain -e integrations/crewai -e mcp

      - name: Ruff lint
        run: ruff check core sdk/python mcp integrations

      - name: Core unit tests
        run: pytest core/tests/ -m "not integration" -v

      - name: Python SDK tests
        run: pytest sdk/python/tests/ -v

      - name: MCP tests
        run: pytest mcp/tests/ -v

  typescript-sdk:
    name: typescript-sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - run: npm ci
      - run: npm test

  dashboard:
    name: dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
